<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#E07B39;--nv:#1a2236;--card:#fff;--bd:rgba(0,0,0,0.08);--tx:#1a2236;--mu:#6b7a99;--bg:#f0f3f8}
@media(prefers-color-scheme:dark){:root{--card:#1e2a3d;--bd:rgba(255,255,255,0.08);--tx:#e8edf5;--mu:#8a9bc0;--bg:#111827}}
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{display:flex;height:100vh;min-height:600px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);overflow:hidden;position:relative}
.sb{width:200px;background:var(--nv);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:16px;border-bottom:1px solid rgba(255,255,255,0.07)}
.logo-t{color:#fff;font-size:14px;font-weight:600}.logo-s{color:rgba(255,255,255,0.35);font-size:10px;margin-top:1px;font-family:monospace}
.ns{padding:10px 8px 3px;color:rgba(255,255,255,0.28);font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:7px;padding:6px 10px;margin:1px 6px;border-radius:5px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:11.5px;transition:.12s;justify-content:space-between}
.ni:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}.ni.act{background:rgba(224,123,57,0.2);color:#f09050}
.ni-left{display:flex;align-items:center;gap:7px}
.vt{margin:auto 6px 8px;display:flex;background:rgba(255,255,255,0.06);border-radius:5px;padding:2px;gap:2px}
.vtb{flex:1;padding:5px 3px;border:none;border-radius:3px;font-size:10px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.38);transition:.12s;font-family:inherit}
.vtb.act{background:var(--or);color:#fff}
.lock-lnk{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;color:rgba(255,255,255,0.3);cursor:pointer;padding:4px 8px;border:0.5px solid rgba(255,255,255,0.08);border-radius:9px;transition:.12s;margin:0 6px 6px}
.lock-lnk:hover{color:rgba(255,255,255,0.65)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tb{padding:10px 18px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--card);flex-shrink:0}
.tb-t{font-size:13.5px;font-weight:500;color:var(--tx)}.tb-s{font-size:10.5px;color:var(--mu);margin-top:1px}
.ct{flex:1;overflow-y:auto;padding:14px 18px}
.card{background:var(--card);border:0.5px solid var(--bd);border-radius:10px;padding:13px 15px;margin-bottom:11px}
.ct2{font-size:11px;font-weight:500;color:var(--mu);margin-bottom:9px;text-transform:uppercase;letter-spacing:.06em}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.mc{background:var(--card);border:0.5px solid var(--bd);border-radius:8px;padding:10px 13px}
.ml{font-size:10px;color:var(--mu);margin-bottom:3px}.mv{font-size:19px;font-weight:500;color:var(--tx)}.mv.or{color:var(--or)}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{text-align:left;padding:5px 9px;color:var(--mu);font-weight:500;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid var(--bd)}
td{padding:8px 9px;border-bottom:0.5px solid var(--bd);color:var(--tx);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.cl:hover td{background:rgba(224,123,57,0.04);cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:5px;border:0.5px solid var(--bd);background:var(--card);color:var(--tx);font-size:11px;cursor:pointer;font-family:inherit;transition:.12s}
.btn:hover{background:var(--bg)}.btn-p{background:var(--or);border-color:var(--or);color:#fff}.btn-p:hover{background:#c96a28}
.btn-sm{padding:2px 7px;font-size:10px}.btn-d{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
@media(prefers-color-scheme:dark){.btn-d{background:#450a0a;border-color:#7f1d1d;color:#fca5a5}}
.bk{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);cursor:pointer;margin-bottom:12px}
.bk:hover{color:var(--tx)}
.field{margin-bottom:9px}.field label{display:block;font-size:10.5px;font-weight:500;color:var(--mu);margin-bottom:3px}
input[type=text],input[type=email],input[type=number],input[type=date],select,textarea{width:100%;padding:6px 9px;border:0.5px solid var(--bd);border-radius:5px;font-size:11.5px;background:var(--card);color:var(--tx);font-family:inherit;outline:none;transition:.12s}
input:focus,select:focus,textarea:focus{border-color:var(--or);box-shadow:0 0 0 2px rgba(224,123,57,0.1)}
.row{display:flex;gap:9px}.row .field{flex:1}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:9.5px;font-weight:500;white-space:nowrap}
.by{background:#fef3c7;color:#92400e}.bb{background:#dbeafe;color:#1e40af}.bg{background:#d1fae5;color:#065f46}.bgr{background:#f1f5f9;color:#475569}.bo{background:#ffedd5;color:#9a3412}.br{background:#fee2e2;color:#991b1b}.bp{background:#fdf4ff;color:#7e22ce}
@media(prefers-color-scheme:dark){.by{background:#451a03;color:#fbbf24}.bb{background:#1e3a5f;color:#93c5fd}.bg{background:#064e3b;color:#6ee7b7}.bgr{background:#1e2a3d;color:#8a9bc0}.bo{background:#431407;color:#fb923c}.br{background:#450a0a;color:#fca5a5}.bp{background:#3b0764;color:#d8b4fe}}
.sdot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:4px}
.tabs{display:flex;border-bottom:0.5px solid var(--bd);margin-bottom:13px}
.tab{padding:7px 13px;font-size:11.5px;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:.12s}
.tab.act{color:var(--or);border-bottom-color:var(--or)}.tab:hover:not(.act){color:var(--tx)}
.steps{display:flex;gap:3px;margin-bottom:13px}
.step{flex:1;padding:6px 3px;text-align:center;border:0.5px solid var(--bd);font-size:9.5px;cursor:pointer;color:var(--mu);transition:.12s;background:var(--card);border-radius:4px}
.step.act{background:var(--or);border-color:var(--or);color:#fff;font-weight:500}.step:hover:not(.act){background:var(--bg)}
/* Chat */
.chat-area{display:flex;flex-direction:column;height:340px}
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;background:var(--bg);border-radius:8px;border:0.5px solid var(--bd);margin-bottom:8px}
.msg{max-width:78%;padding:8px 11px;border-radius:10px;font-size:11.5px;line-height:1.5}
.msg-a{align-self:flex-end;background:var(--or);color:#fff;border-radius:10px 10px 2px 10px}
.msg-c{align-self:flex-start;background:var(--card);border:0.5px solid var(--bd);color:var(--tx);border-radius:10px 10px 10px 2px}
.msg-sys{align-self:center;background:rgba(0,0,0,0.04);color:var(--mu);font-size:10px;padding:3px 9px;border-radius:10px;font-style:italic}
@media(prefers-color-scheme:dark){.msg-sys{background:rgba(255,255,255,0.05)}}
.msg-meta{font-size:9px;opacity:0.55;margin-top:2px}
.msg-file{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.15);border-radius:5px;padding:3px 7px;font-size:10px;margin-top:4px;cursor:pointer}
.msg-file:hover{background:rgba(255,255,255,0.25)}
.chat-inp{display:flex;gap:6px;align-items:center}
/* Docs */
.doc{background:var(--card);border:0.5px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:11px}
.doc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid var(--or)}
.doc-title{font-size:18px;font-weight:500;color:var(--or)}.doc-ref{font-family:monospace;font-size:10px;color:var(--mu);margin-top:2px}
.doc-parties{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;font-size:11px}
.doc-party-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--mu);margin-bottom:4px;font-weight:500}
.doc-party-name{font-weight:500;color:var(--tx);font-size:12px}.doc-party-info{color:var(--mu);font-size:10.5px;margin-top:2px}
.doc-totals{margin-left:auto;width:220px}
.doc-total-main{display:flex;justify-content:space-between;font-size:14px;font-weight:500;padding-top:7px;border-top:1.5px solid var(--or);margin-top:4px;color:var(--or)}
.accept-box{background:var(--bg);border:0.5px solid var(--bd);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;margin-top:8px;cursor:pointer}
.notif{background:rgba(224,123,57,0.1);border:0.5px solid rgba(224,123,57,0.3);border-radius:7px;padding:9px 13px;font-size:11px;color:var(--or);margin-bottom:9px}
.success-notif{background:rgba(16,185,129,0.08);border:0.5px solid rgba(16,185,129,0.3);border-radius:7px;padding:9px 13px;font-size:11px;color:#065f46;margin-bottom:9px}
@media(prefers-color-scheme:dark){.success-notif{color:#6ee7b7}}
.avp{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;padding:2px 7px;border-radius:10px}
.av-y{background:#d1fae5;color:#065f46}.av-n{background:#fee2e2;color:#991b1b}
/* PIN */
.pin-scr{position:absolute;inset:0;background:var(--nv);display:none;align-items:center;justify-content:center;z-index:100}
.pin-box{width:280px;text-align:center}
.pin-logo{color:#fff;font-size:16px;font-weight:600;margin-bottom:2px}
.pin-sub{color:rgba(255,255,255,0.32);font-size:10px;margin-bottom:26px;font-family:monospace}
.pin-label{color:rgba(255,255,255,0.45);font-size:10.5px;margin-bottom:10px}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.pin-dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.22);transition:.15s}.pin-dot.f{background:var(--or);border-color:var(--or)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.pk{background:rgba(255,255,255,0.07);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:500;padding:14px;cursor:pointer;font-family:inherit;transition:.12s}
.pk:hover{background:rgba(255,255,255,0.14)}.pk:active{transform:scale(.93)}.pk.del{font-size:12px;color:rgba(255,255,255,0.45)}
.pin-err{color:#f87171;font-size:10.5px;min-height:16px;margin-top:4px}
.pin-shake{animation:shake .32s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
/* Timeline */
.tl-item{position:relative;padding:0 0 13px 18px}
.tl-item::before{content:'';position:absolute;left:3px;top:8px;width:1px;bottom:0;background:var(--bd)}
.tl-item:last-child::before{display:none}
.tl-dot{position:absolute;left:0;top:5px;width:7px;height:7px;border-radius:50%;border:1.5px solid var(--or);background:var(--card)}.tl-dot.dn{background:var(--or)}
.tl-t{font-size:11.5px;color:var(--tx)}.tl-s{font-size:10px;color:var(--mu);margin-top:1px}
input[type=checkbox]{width:auto;margin:0;accent-color:var(--or)}
/* Upload */
.upload-zone{border:1.5px dashed var(--bd);border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:var(--mu);font-size:11px;transition:.12s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--or);color:var(--or);background:rgba(224,123,57,0.04)}
.file-chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:0.5px solid var(--bd);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--tx);margin:2px}
.file-chip button{background:none;border:none;color:var(--mu);cursor:pointer;padding:0;font-size:11px;line-height:1}
/* Materials */
.mat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.mat-card{border:0.5px solid var(--bd);border-radius:10px;padding:12px;background:var(--card)}
.mat-nm{font-size:12px;font-weight:500;color:var(--tx);margin-bottom:3px}.mat-ds{font-size:10.5px;color:var(--mu);line-height:1.5}
.mat-tags{display:flex;flex-wrap:wrap;gap:2px;margin-top:7px}.mat-tag{font-size:9px;padding:2px 5px;border-radius:9px;background:var(--bg);color:var(--mu)}
/* Devis lines */
.dv-line{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.dv-line input[type=text]{flex:1}.dv-line input[type=number]{width:80px;text-align:right}
/* Swatches */
.swatch{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--bd);cursor:pointer;display:inline-block;transition:.12s;flex-shrink:0}
.swatch.sel{border-color:var(--or);box-shadow:0 0 0 2px rgba(224,123,57,0.3)}
.color-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
/* Devis history */
.dv-hist-item{border:0.5px solid var(--bd);border-radius:7px;padding:9px 12px;margin-bottom:6px;cursor:pointer;transition:.12s}
.dv-hist-item:hover{border-color:var(--or);background:rgba(224,123,57,0.03)}
.dv-hist-item.active{border-color:var(--or);background:rgba(224,123,57,0.06)}
/* Toast */
#pfToast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);color:#fff;padding:10px 20px;border-radius:9px;font-size:11.5px;z-index:9999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.3)}
.empty{text-align:center;padding:28px;color:var(--mu);font-size:11.5px}
.mat-pick-card:hover{border-color:var(--or)!important;background:rgba(224,123,57,0.03)!important}
.mat-pick-card.sel{border-color:var(--or)!important;background:rgba(224,123,57,0.07)!important}
.hsl-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.hsl-lbl{font-size:10px;color:var(--mu);width:20px;flex-shrink:0;font-weight:500}
.hsl-val{font-size:10px;color:var(--mu);width:28px;text-align:right;flex-shrink:0}
.hsl-track{flex:1;position:relative;height:14px;border-radius:7px;overflow:hidden;cursor:pointer}
.hsl-track input[type=range]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;margin:0;padding:0}
.hsl-thumb{position:absolute;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);pointer-events:none;transition:left .05s}
</style>
</head>

const LS_KEY = 'pf_v5';

function sav(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({
      materials: D.materials,
      orders: D.orders,          // contient messages, devisHistory, fichiers, devis, facture
      settings: D.settings,
      nextOid: D.nextOid,
      nextMid: D.nextMid,
    }));
  }catch(e){
    // localStorage plein (peut arriver avec les fichiers en base64)
    // On sauvegarde sans les fichiers en base64 pour garder les données essentielles
    try{
      const lite=JSON.parse(JSON.stringify(D.orders));
      lite.forEach(o=>{ if(o.fichiers) o.fichiers=o.fichiers.map(f=>({...f,data:null,thumb:null})); });
      localStorage.setItem(LS_KEY, JSON.stringify({
        materials:D.materials, orders:lite, settings:D.settings, nextOid:D.nextOid, nextMid:D.nextMid
      }));
      toast('Fichiers non sauvegardés (stockage plein)','warn');
    }catch(e2){console.warn('localStorage full',e2);}
  }
}

function lod(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return;
    const s=JSON.parse(raw);
    ['materials','orders','settings','nextOid','nextMid'].forEach(k=>{
      if(s[k]!==undefined) D[k]=s[k];
    });
    // S'assurer que chaque commande a les nouveaux champs
    D.orders.forEach(o=>{
      if(!o.fichiers) o.fichiers=[];
      if(!o.devisHistory) o.devisHistory=[];
      if(!o.messages) o.messages=[];
    });
  }catch(e){console.warn('lod error',e);}
}

/* ════════════════════════════════════════════════════════════════
   📡 SHEETY — synchronisation cloud (optionnelle, en arrière-plan)
   Le localStorage est la source principale.
   Sheety sert de backup cloud pour statut/devis/paiement/chat.
════════════════════════════════════════════════════════════════ */
async function sheetySync(){
  // ── Filaments ─────────────────────────────────────────────────
  try{
    const r=await fetch(CFG.sheetyFilms);
    if(r.ok){
      const d=await r.json();
      const rows=Object.values(d)[0]||[];
      if(rows.length){
        D.materials=rows.map(row=>({
          id:row.id, sheetyId:row.id,
          nom:row.type||row.nom||row.materiau||'PLA',
          couleur:row.nom||row.couleur||'',
          couleurHex:row.couleur||row.couleurHex||'#ccc',
          prix_kg:parseFloat(row.prixKg||row.prix_kg||row.prix||24)||24,
          dispo:row.dispo!==false&&row.dispo!=='false'&&row.dispo!=='0',
        }));
        D.nextMid=Math.max(...D.materials.map(m=>Number(m.id)||0),D.nextMid)+1;
      }
    }
  }catch(e){console.warn('[Sync filaments]',e);}

  // ── Commandes : Sheety = source de vérité côté admin ───────────
  try{
    const r=await fetch(CFG.sheetyOrders);
    if(!r.ok){ console.warn('[Sync] HTTP',r.status); return {added:0,updated:0}; }

    const d=await r.json();
    const rows=Object.values(d)[0]||[];
    console.log('[Sync]',rows.length,'lignes Sheety | clés:',Object.keys(rows[0]||{}).join(','));

    let added=0, updated=0;

    rows.forEach((row,i)=>{
      // ── Trouver l'ID CMD ───────────────────────────────────────
      let rawId='';
      // Cherche dans tous les champs une valeur CMD-XXX
      for(const val of Object.values(row)){
        const s=(val||'').toString().trim().toUpperCase();
        if(/^CMD.?\d+$/.test(s)){ rawId=s.replace(/^CMD(\d)/,'CMD-$1'); break; }
      }
      // Fallback : générer depuis numéro Sheety
      if(!rawId){
        rawId='CMD-'+String(row.id||i+1).padStart(3,'0');
        console.log('[Sync] ID généré pour ligne',i+1,':',rawId,'| mat=',row.mat,'| client=',row.client);
      }
      // Normaliser CMD-001
      rawId=rawId.replace(/^CMD-?0*/,'CMD-').replace('CMD-','CMD-');
      const parts=rawId.match(/(\d+)$/);
      if(parts) rawId='CMD-'+parts[1].padStart(3,'0');

      // ── Matériau (le champ mat dans Sheety = ID commande, pas le matériau) ──
      const matRaw=(row.mat||'').toString();
      const mat=/^CMD/i.test(matRaw)?
        (row.materiau||row.type||row.matType||row.matériau||'PLA') :
        (matRaw||row.materiau||'PLA');

      let msgs=[];
      if(row.chat){try{msgs=JSON.parse(row.chat);}catch(e){}}

      const existing=D.orders.find(x=>x.id===rawId||x.sheetyId===row.id);
      if(existing){
        // Mettre à jour sans écraser les données locales riches (devis, fichiers…)
        existing.sheetyId=row.id;
        if(row.statut) existing.statut=row.statut;
        if(row.paiement) existing.paiement=row.paiement;
        if(row.client&&!existing.client) existing.client=row.client;
        if(row.email&&!existing.email) existing.email=row.email;
        if(row.projet&&existing.projet==='Projet sans titre') existing.projet=row.projet;
        if(msgs.length>existing.messages.length) existing.messages=msgs;
        updated++;
      } else {
        // Nouvelle commande — importer depuis Sheety
        const newO={
          id:rawId, sheetyId:row.id,
          client:  row.client||'',
          email:   row.email||'',
          tel:'', projet:row.projet||row.project||'Commande '+rawId,
          mat, matType:mat,
          couleurs:row.couleurs?row.couleurs.split('/'):(row.couleur?[row.couleur]:['Blanc']),
          multiFilament:false, urgent:row.urgent==='true'||false,
          statut:  row.statut||'attente devis',
          paiement:row.paiement||'en attente',
          date:    row.date||fmtDate(), notes:row.notes||'',
          poids_g:parseFloat(row.poids_g||0)||0,
          temps_h:parseFloat(row.temps_h||0)||0, temps_cao_h:0,
          demandeSpeciale:null, reponseSpeciale:null,
          messages:msgs, fichiers:[], devisHistory:[], devis:null, facture:null,
        };
        D.orders.push(newO);
        const num=parseInt(rawId.replace(/\D/g,''))||0;
        if(num>=D.nextOid) D.nextOid=num+1;
        added++;
        console.log('[Sync] ✅ Importé:',rawId,newO.client);
      }
    });

    // Trier par ID décroissant
    D.orders.sort((a,b)=>{
      const na=parseInt(a.id.replace(/\D/g,''))||0;
      const nb=parseInt(b.id.replace(/\D/g,''))||0;
      return nb-na;
    });

    if(added||updated) sav();
    console.log('[Sync] ✅ Terminé —',added,'ajoutées,',updated,'mises à jour,',D.orders.length,'total');
    return {added,updated};

  }catch(e){
    console.error('[Sync erreur]',e);
    return {added:0,updated:0};
  }
}


async function sheetyUpsert(o){
  const chatStr=JSON.stringify((o.messages||[]).map(m=>({from:m.from,text:m.text,date:m.date})));

async function gasPost(payload){
  if(!CFG.gasUrl) return null;
  try{
    const r=await fetch(CFG.gasUrl,{method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(payload)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){console.warn('[GAS POST]',e);return null;}
}
async function gasGet(params){
  if(!CFG.gasUrl) return null;
  try{
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    const r=await fetch(CFG.gasUrl+'?'+qs+'&t='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){console.warn('[GAS GET]',e);return null;}
}
async function gasLoadOrder(orderId){
  const d=await gasGet({action:'load',orderId});
  if(!d||!d.success) return;
  const o=D.orders.find(x=>x.id===orderId);if(!o)return;
  if(Array.isArray(d.chat)&&d.chat.length>(o.messages||[]).length) o.messages=d.chat;
  if(d.devis&&(!o.devis||(d.devis.updatedAt>=(o.devis?.updatedAt||'')))){
    o.devis=d.devis;
    if(Array.isArray(d.devisHistory)) o.devisHistory=d.devisHistory;
  }
  if(Array.isArray(d.fichiers)){
    const ids=new Set((o.fichiers||[]).map(f=>f.id));
    d.fichiers.forEach(f=>{if(!ids.has(f.id)) o.fichiers.push(f);});
  }
  sav();
}
async function gasSaveChat(o){
  await gasPost({action:'saveChat',orderId:o.id,
    messages:(o.messages||[]).map(m=>({from:m.from,text:m.text,date:m.date,fileId:m.fileId||null,fileName:m.fileName||null}))});
}
async function gasSaveDevis(o){
  if(!o.devis) return;
  await gasPost({action:'saveDevis',orderId:o.id,
    devis:{...o.devis,updatedAt:new Date().toISOString()},
    devisHistory:o.devisHistory||[]});
}
async function gasSaveFichier(orderId,fichier){
  await gasPost({action:'saveFichier',orderId,fichier});
}
async function gasDelFichier(orderId,fichierId){
  await gasPost({action:'delFichier',orderId,fichierId});
}

/* ════════════════════════════════════════════════════════════════
   📧 FORMSPREE — envoi d'emails sans configuration complexe
   Templates envoyés :
     type: 'commande' → accusé de réception client
     type: 'devis'    → envoi du devis au client
════════════════════════════════════════════════════════════════ */
async function sendEmail(type, params){
  // Tous les emails passent par le Google Apps Script (MailApp.sendEmail)
  // Le GAS doit gérer : {action:'sendEmail', to:'...', subject:'...', body:'...'}
  let subject='', body='';
  if(type==='commande'){
    subject=`[${params.company}] Nouvelle commande — ${params.order_id}`;
    body=`Bonjour ${params.to_name},\n\nNous avons bien reçu votre demande d'impression 3D.\n\nRéférence : ${params.order_id}\nProjet : ${params.projet}\nMatériau : ${params.materiau}\nCouleur(s) : ${params.couleurs}\n\nVotre code de suivi : ${params.order_id}\n\nNous vous enverrons un devis dès que possible.\n\nCordialement,\n${params.company}`;
  }else if(type==='devis'){
    subject=`[${params.company}] Votre devis — ${params.order_id}`;
    body=`Bonjour ${params.to_name},\n\nVotre devis pour le projet "${params.projet}" est prêt.\n\nDétail :\n${params.devis_lignes}\n\nTotal : ${params.devis_total}\n\nConnectez-vous à votre espace suivi avec le code ${params.order_id} pour accepter ce devis.\n\nCordialement,\n${params.company}`;
  }else{
    subject=`[${params.company}] Message`;
    body=JSON.stringify(params,null,2);
  }
  try{
    const res=await gasPost({action:'sendEmail',to:params.to_email,subject,body,replyTo:params.reply_to||D.settings.email_maker});
    if(res&&res.success){
      console.log('Email envoyé via GAS ✓');
      return true;
    }else{
      console.warn('GAS email failed:',res);
      toast('Email non envoyé — vérifiez votre GAS','warn',6000);
      return false;
    }
  }catch(err){
    console.error('sendEmail erreur:',err);
    toast('Email non envoyé','err',5000);
    return false;
  }
}

   DASHBOARD avec recherche + filtres
════════════════════════════════════════════════════════════════ */
function rDash(){
  const tot=D.orders.length,enc=D.orders.filter(o=>o.statut==='impression').length,pay=D.orders.filter(o=>o.paiement==='payé').length;
  const ca=D.orders.filter(o=>o.devis?.total).reduce((a,o)=>a+o.devis.total,0);
  const attenteN=D.orders.filter(o=>o.statut==='attente devis').length;
  const special=D.orders.filter(o=>o.demandeSpeciale&&!o.reponseSpeciale);
  const q=(D.dashSearch||'').toLowerCase();
  const ff=D.dashFilter||'tous';
  let filtered=D.orders.filter(o=>{
    if(ff==='attente') return o.statut==='attente devis';
    if(ff==='impression') return o.statut==='impression';
    if(ff==='nonpaye') return o.paiement==='non payé';
    if(ff==='msg') return o.messages?.length&&o.messages[o.messages.length-1].from==='client';
    return true;
  });
  if(q) filtered=filtered.filter(o=>(o.client+o.projet+o.id).toLowerCase().includes(q));
  const fBtns=[{k:'tous',l:'Tout'},{k:'attente',l:`Devis (${attenteN})`},{k:'impression',l:`En cours (${enc})`},{k:'nonpaye',l:'Non payés'},{k:'msg',l:'Msgs non lus'}];
  const fHtml=fBtns.map(f=>`<button onclick="D.dashFilter='${f.k}';ra()" style="padding:3px 9px;border-radius:14px;border:0.5px solid var(--bd);font-size:10px;cursor:pointer;font-family:inherit;transition:.12s;background:${ff===f.k?'var(--or)':'var(--card)'};color:${ff===f.k?'#fff':'var(--mu)'}">${f.l}</button>`).join('');
  const rows=filtered.map(o=>{
    const newMsg=o.messages?.length&&o.messages[o.messages.length-1].from==='client';
    const isSpec=o.demandeSpeciale&&!o.reponseSpeciale;
    const urgent=o.statut==='attente devis'&&!o.devis;
    const hasFiles=o.fichiers?.length>0;
    return`<tr class="cl" onclick="openDetail('${o.id}')">
    <td style="font-family:monospace;font-size:10px;color:var(--mu)">${urgent?'<span style="color:#ef4444">! </span>':''}${o.id}</td>
    <td><strong>${o.client}</strong>${o.urgent?'<span style="background:#ef4444;color:#fff;font-size:8.5px;font-weight:600;padding:1px 5px;border-radius:8px;margin-left:4px">⚡</span>':''}${newMsg?'<span class="ndot" style="display:inline-block;margin-left:4px;vertical-align:middle"></span>':''}${isSpec?'<span class="badge bp" style="margin-left:4px">Spécial</span>':''}${hasFiles?'<span style="margin-left:4px;font-size:10px">📎</span>':''}<div style="font-size:9.5px;color:var(--mu)">${o.projet}</div></td>
    <td style="font-size:10.5px"><div style="display:flex;align-items:center;gap:4px">${(o.couleurs||[]).slice(0,4).map(c=>`<span style="width:9px;height:9px;border-radius:50%;background:${cfor(c)};border:1px solid var(--bd);flex-shrink:0"></span>`).join('')} ${o.mat}${o.multiFilament?' <span class="badge bp" style="font-size:8px">Multi</span>':''}</div></td>
    <td>${sb(o.statut)}</td>
    <td style="font-family:monospace;font-size:10.5px">${o.devis?.total!=null?o.devis.total.toFixed(2)+' €':'<span style="color:var(--mu)">—</span>'}</td>
    <td>${pb(o.paiement)}</td>
    <td style="font-size:9.5px;color:var(--mu)">${o.date}</td>
    <td style="color:var(--mu)">›</td></tr>`;}).join('');
  return`<div class="mg">
    <div class="mc"><div class="ml">Total</div><div class="mv">${tot}</div></div>
    <div class="mc"><div class="ml">En impression</div><div class="mv or">${enc}</div></div>
    <div class="mc"><div class="ml">Payées</div><div class="mv">${pay}</div></div>
    <div class="mc"><div class="ml">CA total</div><div class="mv">${ca.toFixed(2)} €</div></div>
  </div>
  ${special.length?`<div class="notif">⚠ ${special.length} demande(s) de filament spécial en attente</div>`:''}
  <div style="font-size:9.5px;color:var(--mu);text-align:right;margin-bottom:5px">Dernière sync : <span id="lastSyncTime">—</span> <span style="cursor:pointer;color:var(--or);margin-left:6px" onclick="adminSync()">↻ Actualiser</span></div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap">
      <div class="ct2" style="margin:0">Commandes</div>
      <input type="text" placeholder="Rechercher…" value="${D.dashSearch||''}" oninput="D.dashSearch=this.value;ra()" style="flex:1;min-width:120px;font-size:11px;padding:4px 8px">
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px">${fHtml}</div>
    <div style="font-size:10px;color:var(--mu);margin-bottom:6px">${filtered.length} commande${filtered.length>1?'s':''}</div>
    <div style="overflow-x:auto"><table><thead><tr><th>Réf.</th><th>Client</th><th>Matériau</th><th>Statut</th><th>Devis</th><th>Paiement</th><th>Date</th><th></th></tr></thead><tbody>${rows||'<tr><td colspan="8" class="empty">Aucune commande</td></tr>'}</tbody></table></div>
  </div>`;
}

/* ════════════════════════════════════════════════════════════════
   DETAIL COMMANDE
════════════════════════════════════════════════════════════════ */
function openDetail(id){D.detailId=id;D.detailTab='infos';ra();gasLoadOrder(id).then(()=>ra()).catch(()=>{}); }
function setDTab(t){D.detailTab=t;ra();}
function rOrderDetail(){
  const o=D.orders.find(x=>x.id===D.detailId);if(!o)return'';
  const nFiles=o.fichiers?.length||0;
  const tabs=['infos','chat','fichiers','devis','facture'];
  const tabL=[
    'Infos',
    'Chat'+(o.messages?.length?` (${o.messages.length})`:''),
    'Fichiers'+(nFiles?` (${nFiles})`:''),
    (o.devis?.statut==='envoyé'?'Devis 🔔':'Devis')+(o.devisHistory?.length>1?` (${o.devisHistory.length})`:''),
    'Facture'
  ];
  const tHtml=tabs.map((t,i)=>`<div class="tab${D.detailTab===t?' act':''}" onclick="setDTab('${t}')">${tabL[i]}</div>`).join('');
  let body='';
  if(D.detailTab==='infos') body=rDetailInfos(o);
  else if(D.detailTab==='chat') body=rDetailChat(o);
  else if(D.detailTab==='fichiers') body=rDetailFichiers(o);
  else if(D.detailTab==='devis') body=rDetailDevis(o);
  else if(D.detailTab==='facture') body=rDetailFacture(o);
  return`<div class="bk" onclick="D.detailId=null;D.page='dashboard';ra()">← Retour</div>
  <div class="tabs">${tHtml}</div>${body}`;
}

/* ── Infos ── */
function rDetailInfos(o){
  const stepsH=STATUTS.map(s=>`<div class="step${o.statut===s?' act':''}" onclick="setOF('${o.id}','statut','${s}')">${s.charAt(0).toUpperCase()+s.slice(1)}</div>`).join('');
  const paieOpts=PAIE.map(p=>`<option value="${p}" ${o.paiement===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('');
  const matOpts=['PLA','PLA+','PETG','TPU','Résine'].map(t=>`<option value="${t}" ${(o.matType||o.mat)===t?'selected':''}>${t}</option>`).join('');
  const cc=o.couleurs||['Blanc'];
  const swatches=COULEURS.map(c=>`<span class="swatch${cc.includes(c)?' sel':''}" title="${c}" style="background:${cfor(c)}" onclick="toggleCouleur('${o.id}','${c}')"></span>`).join('');
  const specBox=o.demandeSpeciale?`<div class="notif"><strong>Filament spécial :</strong> "${o.demandeSpeciale}"<br>${o.reponseSpeciale?`<span style="color:var(--or)">Répondu : "${o.reponseSpeciale}"</span>`:`<div style="display:flex;gap:6px;margin-top:6px"><input id="repSpec" placeholder="Votre réponse..." style="flex:1;font-size:11px"><button class="btn btn-p btn-sm" onclick="repondreSpecial('${o.id}')">Répondre</button></div>`}</div>`:'';
  return`<div class="card"><div class="ct2">Avancement</div><div class="steps">${stepsH}</div></div>
  ${specBox}
  <div class="card"><div class="ct2">Informations client</div>
    <div class="row"><div class="field"><label>Nom</label><input type="text" value="${o.client}" onchange="setOF('${o.id}','client',this.value)"></div><div class="field"><label>Email</label><input type="email" value="${o.email}" onchange="setOF('${o.id}','email',this.value)"></div></div>
    <div class="row"><div class="field"><label>Projet</label><input type="text" value="${o.projet}" onchange="setOF('${o.id}','projet',this.value)"></div><div class="field"><label>Date</label><input type="date" value="${o.date}" onchange="setOF('${o.id}','date',this.value)"></div></div>
    <div class="row"><div class="field"><label>Type matière</label><select onchange="setOF('${o.id}','matType',this.value)">${matOpts}</select></div><div class="field"><label>Paiement</label><select onchange="setOF('${o.id}','paiement',this.value)">${paieOpts}</select></div></div>
    <div class="field"><label>Couleurs (${cc.length}/4)</label><div class="color-grid">${swatches}</div><div style="font-size:9.5px;color:var(--mu);margin-top:4px">${cc.join(', ')}</div></div>
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:9px"><input type="checkbox" ${o.multiFilament?'checked':''} onchange="setOF('${o.id}','multiFilament',this.checked)"><label style="font-size:11.5px;color:var(--tx);cursor:pointer">Multi-filament (jusqu'à 4 couleurs)</label></div>
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:9px"><input type="checkbox" ${o.urgent?'checked':''} onchange="setOF('${o.id}','urgent',this.checked)" style="accent-color:#ef4444"><label style="font-size:11.5px;color:#c2410c;cursor:pointer;font-weight:500">⚡ Urgente (+15% au devis)</label></div>
    <div class="ct2" style="margin-top:2px">Paramètres impression</div>
    <div class="row">
      <div class="field"><label>Poids (g)</label><input type="number" value="${o.poids_g||0}" onchange="setOF('${o.id}','poids_g',+this.value)"></div>
      <div class="field"><label>Temps impr. (h)</label><input type="number" step="0.5" value="${o.temps_h||0}" onchange="setOF('${o.id}','temps_h',+this.value)"></div>
      <div class="field"><label>Temps CAO (h)</label><input type="number" step="0.5" value="${o.temps_cao_h||0}" onchange="setOF('${o.id}','temps_cao_h',+this.value)"></div>
    </div>
    <div class="field"><label>Notes internes</label><textarea rows="2" onchange="setOF('${o.id}','notes',this.value)">${o.notes||''}</textarea></div>
    <div style="display:flex;gap:5px;margin-top:4px">
      <button class="btn btn-p" onclick="setOF_save('${o.id}')">Enregistrer</button>
      <button class="btn btn-d btn-sm" onclick="delOrder('${o.id}')">Supprimer</button>
    </div>
  </div>`;
}
function setOF_save(id){sav();sheetyUpsert(D.orders.find(x=>x.id===id));toast('Enregistré ✓','ok');}
function setOF(id,field,val){
  const o=D.orders.find(x=>x.id===id);if(!o)return;
  o[field]=val;sav();
  if(['statut','paiement'].includes(field)) sheetyUpsert(o);
  if(['statut','paiement','multiFilament'].includes(field)) ra();
}
function toggleCouleur(oid,c){
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  if(!o.couleurs) o.couleurs=['Blanc'];
  if(o.couleurs.includes(c)){if(o.couleurs.length>1)o.couleurs=o.couleurs.filter(x=>x!==c);}
  else if(o.couleurs.length<4) o.couleurs.push(c);
  sav();ra();
}
function repondreSpecial(oid){
  const rep=(document.getElementById('repSpec')||{}).value?.trim();if(!rep)return;
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  o.reponseSpeciale=rep;
  o.messages.push({from:'admin',text:'Réponse filament spécial : '+rep,date:fmtDateTime()});
  sheetyUpsert(o);sav();ra();
}
function delOrder(id){if(!confirm('Supprimer cette commande ?'))return;D.orders=D.orders.filter(x=>x.id!==id);D.detailId=null;D.page='dashboard';sav();ra();}
async function adminSync(){
  toast('Synchronisation en cours…','info',2000);
  const prev=D.orders.length;
  const res=await sheetySync();
  const el=document.getElementById('lastSyncTime');
  if(el)el.textContent=fmtDateTime();
  ra();
  const diff=D.orders.length-prev;
  if(diff>0) toast(diff+' nouvelle(s) commande(s) importée(s) ✓','ok',5000);
  else toast('Synchronisé — '+D.orders.length+' commande(s) au total','ok',3000);
}
function newOrder(){
  const id='CMD-0'+String(D.nextOid++).padStart(2,'0');
  const o={id,client:'',email:'',tel:'',projet:'Nouveau projet',mat:'PLA',matType:'PLA',couleurs:['Blanc'],multiFilament:false,demandeSpeciale:null,reponseSpeciale:null,statut:'attente devis',paiement:'en attente',date:new Date().toISOString().slice(0,10),notes:'',poids_g:0,temps_h:0,temps_cao_h:0,messages:[],fichiers:[],devisHistory:[],devis:null,facture:null};
  D.orders.unshift(o);sav();sheetyUpsert(o);openDetail(id);
}

/* ════════════════════════════════════════════════════════════════
   💬 CHAT — sauvegardé dans localStorage
════════════════════════════════════════════════════════════════ */
function rDetailChat(o){
  const msgs=(o.messages||[]).map(m=>{
    const fileHtml=m.fileId?`<div class="msg-file" onclick="openFile('${o.id}','${m.fileId}')">📎 ${m.fileName||'Fichier'}</div>`:'';
    return`<div class="msg ${m.from==='admin'?'msg-a':'msg-c'}">${m.text}${fileHtml}<div class="msg-meta">${m.from==='admin'?'Vous':'Client'} · ${m.date}</div></div>`;
  }).join('')||'<div class="msg-sys">Aucun message</div>';
  return`<div class="chat-area">
    <div class="chat-msgs" id="chatMsgs">${msgs}</div>
    <div class="chat-inp">
      <label style="cursor:pointer;color:var(--mu);font-size:18px;padding:0 4px" title="Joindre un fichier">
        📎<input type="file" style="display:none" accept=".stl,.3mf,.jpg,.jpeg,.png,.pdf" onchange="attachFileMsg('${o.id}','admin',this)">
      </label>
      <input type="text" id="chatIn" placeholder="Votre message…" style="flex:1" onkeydown="if(event.key==='Enter')sendMsg('${o.id}','admin')">
      <button class="btn btn-p" onclick="sendMsg('${o.id}','admin')">Envoyer</button>
    </div>
  </div>`;
}
function sendMsg(oid,from){
  const el=document.getElementById(from==='admin'?'chatIn':'clientChatIn');
  if(!el)return;const text=el.value.trim();if(!text)return;
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  if(!o.messages) o.messages=[];
  o.messages.push({from,text,date:fmtDateTime()});
  el.value='';
  sheetyUpsert(o);gasSaveChat(o);sav();ra();
}

/* ════════════════════════════════════════════════════════════════
   📎 PIÈCES JOINTES — stockées en base64 dans localStorage
════════════════════════════════════════════════════════════════ */
function rDetailFichiers(o){
  const files=o.fichiers||[];
  const list=files.length===0?`<div class="empty">Aucune pièce jointe</div>`:
    files.map((f,i)=>`<div class="dv-hist-item" style="display:flex;align-items:center;gap:10px">
      <div style="font-size:22px">${fileIcon(f.type)}</div>
      <div style="flex:1">
        <div style="font-size:11.5px;font-weight:500;color:var(--tx)">${f.name}</div>
        <div style="font-size:10px;color:var(--mu)">${humanSize(f.size)} · ${f.date}${f.from==='client'?' · Client':' · Admin'}</div>
      </div>
      <button class="btn btn-sm" onclick="openFile('${o.id}','${f.id}')">Ouvrir</button>
      <button class="btn btn-sm btn-d" onclick="deleteFile('${o.id}','${f.id}')">✕</button>
    </div>`).join('');

  return`<div class="card">
    <div class="ct2">Pièces jointes (${files.length})</div>
    ${list}
    <div style="margin-top:10px">
      <label class="upload-zone" id="dropZone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop('${o.id}','admin',event)">
        <input type="file" style="display:none" multiple accept=".stl,.3mf,.jpg,.jpeg,.png,.pdf,.step,.obj" onchange="uploadFiles('${o.id}','admin',this.files)">
        <div style="font-size:20px;margin-bottom:4px">⊕</div>
        <div>Cliquez ou déposez vos fichiers</div>
        <div style="font-size:9.5px;margin-top:2px;opacity:0.65">STL, 3MF, STEP, JPG, PNG, PDF</div>
      </label>
    </div>
  </div>`;
}

function handleDrop(oid,from,e){
  e.preventDefault();
  document.getElementById('dropZone')?.classList.remove('drag');
  uploadFiles(oid,from,e.dataTransfer.files);
}

function uploadFiles(oid,from,files){
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  if(!o.fichiers) o.fichiers=[];
  let count=0;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const fid='F'+Date.now()+Math.random().toString(36).slice(2,6);
      const isImg=file.type.startsWith('image/');
      o.fichiers.push({
        id:fid,
        name:file.name,
        type:file.type||'application/octet-stream',
        size:file.size,
        date:fmtDate(),
        from,
        data:ev.target.result,   // base64 complet
        thumb:isImg?ev.target.result:null,
      });
      count++;
      if(count===files.length){sav();ra();toast(`${count} fichier(s) ajouté(s) ✓`,'ok');}
    };
    reader.readAsDataURL(file);
  });
}

function attachFileMsg(oid,from,input){
  const file=input.files[0];if(!file)return;
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  if(!o.fichiers) o.fichiers=[];
  if(!o.messages) o.messages=[];
  const reader=new FileReader();
  reader.onload=ev=>{
    const fid='F'+Date.now();
    o.fichiers.push({id:fid,name:file.name,type:file.type,size:file.size,date:fmtDate(),from,data:ev.target.result,thumb:file.type.startsWith('image/')?ev.target.result:null});
    o.messages.push({from,text:'',fileId:fid,fileName:file.name,date:fmtDateTime()});
    const _f=o.fichiers[o.fichiers.length-1];gasSaveFichier(o.id,_f);gasSaveChat(o);sheetyUpsert(o);sav();ra();toast('Fichier joint ✓','ok');
  };
  reader.readAsDataURL(file);
}

function openFile(oid,fid){
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  const f=o.fichiers?.find(x=>x.id===fid);if(!f||!f.data)return toast('Fichier non disponible','err');
  const a=document.createElement('a');a.href=f.data;a.download=f.name;a.click();
}

function deleteFile(oid,fid){
  if(!confirm('Supprimer ce fichier ?'))return;
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  o.fichiers=(o.fichiers||[]).filter(f=>f.id!==fid);
  gasDelFichier(o.id,fid);
  sav();ra();toast('Fichier supprimé','ok');
}

/* ════════════════════════════════════════════════════════════════
   📊 DEVIS — avec historique sauvegardé
════════════════════════════════════════════════════════════════ */
function calcDevis(o){
  const elecRate=D.settings.elec[o.matType]||D.settings.elec.default||0.15;
  const mat=D.materials.find(m=>m.nom===o.matType)||D.materials[0];
  const prixKg=mat?mat.prix_kg:24;
  const filament=(prixKg/1000)*(o.poids_g||0);
  const elec=elecRate*(o.temps_h||0);
  const cao=D.settings.cao*(o.temps_cao_h||0);
  const sousTotal=filament+elec+cao;
  const urgentSuppl=o.urgent?sousTotal*0.15:0;
  return{filament,elec,cao,marge:sousTotal*D.settings.marge,urgentSuppl,sousTotal,total:+(sousTotal*(1+D.settings.marge)+urgentSuppl).toFixed(2),elecRate,prixKg};
}
function autoLignes(o){
  const c=calcDevis(o);const l=[];
  const coulStr=(o.couleurs||['?']).join('/');
  if(o.poids_g)l.push({label:`Filament ${o.matType} ${coulStr} (${o.poids_g}g × ${c.prixKg}€/kg)`,mt:+c.filament.toFixed(2)});
  if(o.temps_h)l.push({label:`Électricité (${o.temps_h}h × ${c.elecRate}€/h)`,mt:+c.elec.toFixed(2)});
  if(o.temps_cao_h)l.push({label:`Conception CAO (${o.temps_cao_h}h × ${D.settings.cao}€/h)`,mt:+c.cao.toFixed(2)});
  if(o.multiFilament)l.push({label:'Supplément multi-filament',mt:5.00});
  l.push({label:`Marge (${Math.round(D.settings.marge*100)}%)`,mt:+c.marge.toFixed(2)});
  if(o.urgent&&c.urgentSuppl>0)l.push({label:'⚡ Urgence (+15%)',mt:+c.urgentSuppl.toFixed(2)});
  return{lignes:l,total:+l.reduce((a,x)=>a+x.mt,0).toFixed(2)};
}

function rDetailDevis(o){
  const hist=o.devisHistory||[];
  let html='';

  // Historique des devis passés (s'il y en a plusieurs)
  if(hist.length>1){
    html+=`<div class="card"><div class="ct2">Historique des devis (${hist.length})</div>`;
    html+=hist.slice().reverse().map((h,i)=>{
      const isCurrent=h.ref===o.devis?.ref;
      return`<div class="dv-hist-item${isCurrent?' active':''}" style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;font-weight:500;color:var(--tx)">${h.ref} — ${h.total?.toFixed(2)} €</div>
        <div style="font-size:10px;color:var(--mu)">Créé le ${h.createdAt} · ${h.statut}</div></div>
        <span class="badge ${h.statut==='accepté'?'bg':h.statut==='envoyé'?'bb':'bgr'}">${h.statut}</span>
      </div>`;
    }).join('');
    html+=`</div>`;
  }

function genDevis(oid){
  const o=D.orders.find(x=>x.id===oid);if(!o)return;
  const{lignes,total}=autoLignes(o);
  const n=(o.devisHistory||[]).length+1;
  const ref='DV-'+o.id.replace('CMD-','')+'-v'+n;
  o.devis={ref,lignes,total,statut:'brouillon',sentAt:null,acceptedAt:null,createdAt:fmtDate()};
  if(!o.devisHistory) o.devisHistory=[];
  // Ajouter à l'historique (sans dupliquer)
  if(!o.devisHistory.find(h=>h.ref===ref)){
    o.devisHistory.push({ref,lignes:JSON.parse(JSON.stringify(lignes)),total,statut:'brouillon',createdAt:fmtDate(),sentAt:null,acceptedAt:null});
  }
  sav();ra();
}
function editDvLine(oid,i,f,v){const o=D.orders.find(x=>x.id===oid);if(!o?.devis)return;if(f==='l')o.devis.lignes[i].label=v;else o.devis.lignes[i].mt=v;o.devis.total=+o.devis.lignes.reduce((a,l)=>a+l.mt,0).toFixed(2);sav();}
function addDvLine(oid){const o=D.orders.find(x=>x.id===oid);if(!o?.devis)return;o.devis.lignes.push({label:'Ligne supplémentaire',mt:0});sav();ra();}
function rmDvLine(oid,i){const o=D.orders.find(x=>x.id===oid);if(!o?.devis)return;o.devis.lignes.splice(i,1);o.devis.total=+o.devis.lignes.reduce((a,l)=>a+l.mt,0).toFixed(2);sav();ra();}
function resetDevis(oid){if(!confirm('Supprimer ce devis ?'))return;const o=D.orders.find(x=>x.id===oid);if(o)o.devis=null;sav();ra();}

async function sendDevis(oid){
  const o=D.orders.find(x=>x.id===oid);if(!o?.devis)return;
  o.devis.statut='envoyé';o.devis.sentAt=fmtDate();
  // Mettre à jour l'historique
  const h=o.devisHistory?.find(x=>x.ref===o.devis.ref);
  if(h){h.statut='envoyé';h.sentAt=fmtDate();}
  o.messages.push({from:'admin',text:`Votre devis de ${o.devis.total.toFixed(2)} € est disponible dans votre espace suivi.`,date:fmtDateTime()});
  sheetyUpsert(o);gasSaveDevis(o);gasSaveChat(o);sav();ra();
  // EmailJS
  const lignesTxt=o.devis.lignes.map(l=>`• ${l.label} : ${l.mt.toFixed(2)} €`).join('\n');
  const ok=await sendEmail('devis',{
    to_name:   o.client,
    to_email:  o.email,
    order_id:  o.id,
    projet:    o.projet,
    devis_total: o.devis.total.toFixed(2)+' €',
    devis_lignes: lignesTxt,
    company:   D.settings.nom_maker,
    reply_to:  D.settings.email_maker,
  });
  if(ok) toast('Devis envoyé + email ✓','ok');
  else    toast('Devis envoyé (email échoué — voir console)','warn');
}

function acceptDevis(oid){
  if(!confirm('Confirmer l\'acceptation de ce devis ?'))return;
  const o=D.orders.find(x=>x.id===oid);if(!o?.devis)return;
  o.devis.statut='accepté';o.devis.acceptedAt=fmtDate();
  const h=o.devisHistory?.find(x=>x.ref===o.devis.ref);
  if(h){h.statut='accepté';h.acceptedAt=fmtDate();}
  o.messages.push({from:'client',text:'J\'accepte le devis. Vous pouvez lancer la production !',date:fmtDateTime()});
  sheetyUpsert(o);gasSaveDevis(o);gasSaveChat(o);sav();ra();
}

let _hsl={h:210,s:70,l:50};
function hexToHsl(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}}
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}
function hslToHex(h,s,l){
  s/=100;l/=100;const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(Math.min(k-3,9-k,1),-1);};
  const x=v=>Math.round(v*255).toString(16).padStart(2,'0');
  return'#'+x(f(0))+x(f(8))+x(f(4));
}

function onHslChange(){
  const h=+document.getElementById('slH').value,s=+document.getElementById('slS').value,l=+document.getElementById('slL').value;
  _hsl={h,s,l};const hex=hslToHex(h,s,l);
  document.getElementById('matColorPreview').style.background=hex;
  document.getElementById('fh').value=hex;
  document.getElementById('fhDisp').textContent=hex;
  document.getElementById('thumbH').style.left=`calc(${(h/360*100).toFixed(1)}% - 8px)`;
  document.getElementById('thumbH').style.background=`hsl(${h},80%,55%)`;
  document.getElementById('thumbS').style.left=`calc(${s}% - 8px)`;
  document.getElementById('thumbS').style.background=`hsl(${h},${s}%,${l}%)`;
  document.getElementById('thumbL').style.left=`calc(${l}% - 8px)`;
  document.getElementById('thumbL').style.background=`hsl(${h},${s}%,${l}%)`;
  document.getElementById('trackS').style.background=`linear-gradient(to right,hsl(${h},0%,${l}%),hsl(${h},100%,${l}%))`;
  document.getElementById('trackL').style.background=`linear-gradient(to right,#000,hsl(${h},${s}%,50%),#fff)`;
  document.getElementById('valH').textContent=h+'°';document.getElementById('valS').textContent=s+'%';document.getElementById('valL').textContent=l+'%';
  document.querySelectorAll('[id^="pal_"]').forEach(el=>{el.style.border='1.5px solid rgba(0,0,0,0.1)';el.style.boxShadow='none';});
}
function pickMatColor(nom,hex){

function rDevisGen(){

function gCalc(){
  const sel=document.getElementById('gmat');if(!sel)return;
  const mat=D.materials.find(m=>m.id===parseInt(sel.value));if(!mat)return;
  const poids=parseFloat(document.getElementById('gpoids').value)||0;
  const temps=parseFloat(document.getElementById('gtemps').value)||0;
  const tcao=parseFloat(document.getElementById('gcao').value)||0;
  const multi=document.getElementById('gmulti').checked;
  const er=D.settings.elec[mat.nom]||D.settings.elec.default||0.15;
  const f=(mat.prix_kg/1000)*poids,e=er*temps,c=D.settings.cao*tcao;
  const st=f+e+c+(multi?5:0),mg=st*D.settings.marge,tot=st+mg;
  document.getElementById('gresult').innerHTML=`
    <div style="background:linear-gradient(135deg,#1a2236,#2d3a52);border-radius:9px;padding:14px;color:#fff">
      <div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.07)"><span>Filament</span><span>${f.toFixed(2)} €</span></div>

      ${multi?`<div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.07)"><span>Multi-filament</span><span>5.00 €</span></div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:11px;padding:3px 0;opacity:0.6"><span>Marge (${Math.round(D.settings.marge*100)}%)</span><span>${mg.toFixed(2)} €</span></div>
      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:500;padding-top:9px;border-top:1px solid rgba(255,255,255,0.12);color:#f09050"><span>Total</span><span>${tot.toFixed(2)} €</span></div>
    </div>`;
}

function toggleUrgent(){
  const checked=(document.getElementById('ourgent')||{}).checked;

function toggleClientCouleur(c){
  if(clientCouleurs.includes(c)) clientCouleurs=clientCouleurs.filter(x=>x!==c);
  else if(clientCouleurs.length<4) clientCouleurs.push(c);
  document.querySelectorAll('.color-grid .swatch').forEach(el=>{el.className='swatch'+(clientCouleurs.includes(el.title)?' sel':'');});

function cliDrop(e){e.preventDefault();document.getElementById('cliDropZone')?.classList.remove('drag');cliFilesAdd(e.dataTransfer.files);}
function cliFilesAdd(files){
  Array.from(files).forEach(file=>{
    const r=new FileReader();

      clientFiles.push({name:file.name,type:file.type,size:file.size,data:ev.target.result});

      if(list) list.innerHTML=clientFiles.map((f,i)=>`<span class="file-chip">${fileIcon(f.type)} ${f.name} <button onclick="clientFiles.splice(${i},1);cliFilesAdd([])">×</button></span>`).join('');

    r.readAsDataURL(file);
  });
}

  const o=D.orders.find(x=>x.id===D.clientTrackId);
  if(!o)return`<div class="card"><div class="empty">Commande introuvable. <span style="cursor:pointer;color:var(--or)" onclick="D.clientTrackId=null;ra()">Réessayer</span></div></div>`;
  const ctabs=[{id:'statut',l:'Statut'},{id:'chat',l:'Chat'+(o.messages?.some(m=>m.from==='admin')?' 💬':'')},{id:'devis',l:'Devis'+(o.devis?.statut==='envoyé'?' 🔔':'')},{id:'fichiers',l:'Fichiers'+(o.fichiers?.length?` (${o.fichiers.length})`:'')}];
  const tHtml=ctabs.map(t=>`<div class="tab${(D.clientTrackTab||'statut')===t.id?' act':''}" onclick="D.clientTrackTab='${t.id}';ra()">${t.l}</div>`).join('');
  let body='';
  const tab=D.clientTrackTab||'statut';
  if(tab==='statut'){
    const steps=[{l:'Demande reçue',d:true,s:o.date},{l:'Devis préparé',d:!!o.devis,s:o.devis?o.devis.total.toFixed(2)+' €':''},{l:'Devis accepté',d:o.devis?.statut==='accepté',s:''},{l:'En impression',d:o.statut==='impression'||o.statut==='terminé',s:''},{l:'Terminé',d:o.statut==='terminé',s:''}];
    body=`<div class="card">
      ${o.urgent?'<div style="background:#fff7ed;border:0.5px solid #fed7aa;border-radius:7px;padding:8px 12px;font-size:11px;color:#c2410c;margin-bottom:10px;font-weight:500">⚡ Urgente — traitement prioritaire (+15%)</div>':''}
      <div style="margin-bottom:10px"><div style="font-size:13px;font-weight:500">${o.projet}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:3px">${(o.couleurs||[]).map(c=>`<span style="width:9px;height:9px;border-radius:50%;background:${cfor(c)};border:1px solid var(--bd)"></span>`).join('')}<span style="font-size:10.5px;color:var(--mu)">${o.mat} · ${(o.couleurs||[]).join('/')}${o.multiFilament?' · Multi-filament':''}</span></div>
      </div>
      <div style="display:flex;gap:5px;margin-bottom:12px">${sb(o.statut)} ${pb(o.paiement)}</div>
      ${o.reponseSpeciale?`<div class="success-notif" style="margin-bottom:10px">Réponse filament spécial : "${o.reponseSpeciale}"</div>`:''}
      ${o.demandeSpeciale&&!o.reponseSpeciale?`<div class="notif" style="margin-bottom:10px">Votre demande de filament spécial est en cours d'examen.</div>`:''}
      ${steps.map(s=>`<div class="tl-item"><div class="tl-dot${s.d?' dn':''}"></div><div class="tl-t" style="color:${s.d?'var(--tx)':'var(--mu)'}">${s.l}</div>${s.s?`<div class="tl-s">${s.s}</div>`:''}</div>`).join('')}
      ${o.facture?.statut==='envoyée'?`<div class="success-notif" style="margin-top:8px">Facture de ${o.facture.total.toFixed(2)} € émise.</div>`:''}
    </div><button class="btn btn-sm" onclick="D.clientTrackId=null;ra()">← Autre commande</button>`;
  }else if(tab==='chat'){
    const msgs=(o.messages||[]).map(m=>{
      const fileHtml=m.fileId?`<div class="msg-file" onclick="openFile('${o.id}','${m.fileId}')">📎 ${m.fileName||'Fichier'}</div>`:'';
      return`<div class="msg ${m.from==='admin'?'msg-a':'msg-c'}">${m.text}${fileHtml}<div class="msg-meta">${m.from==='admin'?'SZ IMPRESS3D':'Vous'} · ${m.date}</div></div>`;
    }).join('')||'<div class="msg-sys">Aucun message</div>';
    body=`<div class="chat-area"><div class="chat-msgs" id="cliChatMsgs">${msgs}</div>
      <div class="chat-inp">
        <label style="cursor:pointer;color:var(--mu);font-size:18px;padding:0 4px" title="Joindre">📎<input type="file" style="display:none" accept=".stl,.3mf,.jpg,.jpeg,.png,.pdf" onchange="attachFileMsg('${o.id}','client',this)"></label>
        <input type="text" id="clientChatIn" placeholder="Votre message…" style="flex:1" onkeydown="if(event.key==='Enter')sendMsg('${o.id}','client')">
        <button class="btn btn-p" onclick="sendMsg('${o.id}','client')">Envoyer</button>
      </div>
    </div>`;
  }else if(tab==='devis'){
    if(!o.devis||o.devis.statut==='brouillon') body=`<div class="empty">Aucun devis disponible.<br>Vous serez notifié dès qu'un devis est prêt.</div>`;
    else{
      const dv=o.devis,ref='DV-'+o.id.replace('CMD-','');
      const accepted=dv.statut==='accepté';
      const lH=dv.lignes.map(l=>`<tr><td>${l.label}</td><td style="text-align:right;font-family:monospace">${l.mt.toFixed(2)} €</td></tr>`).join('');
      body=`<div class="doc">
        <div class="doc-header"><div><div class="doc-title">DEVIS</div><div class="doc-ref">${ref} · ${dv.sentAt||''}</div></div>${accepted?'<span class="badge bg" style="font-size:11px;padding:4px 10px">✓ Accepté</span>':'<span class="badge bb" style="font-size:11px;padding:4px 10px">En attente</span>'}</div>
        <div class="doc-parties"><div><div class="doc-party-label">De</div><div class="doc-party-name">${D.settings.nom_maker}</div></div><div><div class="doc-party-label">À</div><div class="doc-party-name">${o.client}</div></div></div>
        <table><thead><tr><th>Désignation</th><th style="text-align:right">Montant</th></tr></thead><tbody>${lH}</tbody></table>
        <div class="doc-totals" style="margin-top:8px"><div class="doc-total-main"><span>TOTAL</span><span>${dv.total.toFixed(2)} €</span></div><div style="font-size:9.5px;color:var(--mu);margin-top:4px">Valable 30 jours</div></div>
      </div>
      ${!accepted?`<div class="accept-box" onclick="acceptDevis('${o.id}')"><input type="checkbox" id="acceptChk"><label for="acceptChk" style="font-size:11.5px;cursor:pointer;line-height:1.4">J'accepte ce devis et confirme vouloir procéder à l'impression.</label></div>`:`<div class="success-notif" style="margin-top:8px">✓ Accepté le ${dv.acceptedAt}. La production va démarrer !</div>`}`;
    }
  }else if(tab==='fichiers'){
    const files=o.fichiers||[];
    body=files.length===0?`<div class="empty">Aucune pièce jointe</div>`:
      `<div class="card">`+files.map(f=>`<div class="dv-hist-item" style="display:flex;align-items:center;gap:10px">
        <div style="font-size:22px">${fileIcon(f.type)}</div>
        <div style="flex:1"><div style="font-size:11.5px;font-weight:500">${f.name}</div><div style="font-size:10px;color:var(--mu)">${humanSize(f.size)} · ${f.date}${f.from==='client'?' · Vous':' · SZ IMPRESS3D'}</div></div>
        <button class="btn btn-sm" onclick="openFile('${o.id}','${f.id}')">Télécharger</button>
      </div>`).join('')+`</div>`;
  }
  return`<div class="tabs">${tHtml}</div>${body}`;
}
function doTrack(){const v=(document.getElementById('trkIn')||{}).value;if(!v)return;D.clientTrackId=v.trim().toUpperCase();D.clientTrackTab='statut';ra();}

/* ════════════════════════════════════════════════════════════════
   🚀 INIT
════════════════════════════════════════════════════════════════ */
/* Auto-sync toutes les 30s en mode admin */
let _syncInterval=null;
function startAutoSync(){
  stopAutoSync();
  _syncInterval=setInterval(async()=>{
    if(!D.adminOk) return stopAutoSync();
    const prev=D.orders.length;
    await sheetySync();
    if(D.orders.length>prev){
      ra();
      toast(D.orders.length-prev+' nouvelle(s) commande(s) !','ok',5000);
    }
  },30000);
}
function stopAutoSync(){clearInterval(_syncInterval);_syncInterval=null;}

function init(){
  document.getElementById('pinScr').style.display='none';
  lod();           // charge tout depuis localStorage
  D.view='client'; // toujours démarrer côté client
  D.adminOk=false;
  ra();
  // Sync Sheety en arrière-plan (non-bloquant)
  sheetySync().then(()=>ra()).catch(()=>{});
}
init();
/* ════════════════════════════════════════════════════
   ✦ CONSEILLER IA — Claude API pour conseils matériaux
════════════════════════════════════════════════════ */
let iaMessages=[];

function rIAConseil(){
  const msgs=iaMessages.map(m=>{
    if(m.role==='user') return`<div class="msg msg-c" style="max-width:85%">${m.content}<div class="msg-meta">Vous</div></div>`;
    return`<div class="msg msg-a" style="max-width:90%;font-size:11.5px;line-height:1.6">${m.content}<div class="msg-meta">Conseiller SZ IMPRESS3D</div></div>`;
  }).join('');
  const stockDispo=D.materials.filter(m=>m.dispo).map(m=>m.nom+' '+m.couleur).join(', ');
  const suggestions=['Quel matériau pour une pièce flexible ?','Je veux imprimer une figurine','Pièce résistante à l\'humidité ?','Matériau alimentaire sûr ?','Différence PLA et PETG ?'];
  return`<div style="max-width:600px">
    <div class="card" style="margin-bottom:10px;background:linear-gradient(135deg,rgba(224,123,57,0.08),rgba(224,123,57,0.02));border-color:rgba(224,123,57,0.25)">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:#fff">✦</div>
        <div><div style="font-size:12px;font-weight:500;color:var(--tx)">Conseiller matériaux IA</div>
        <div style="font-size:10px;color:var(--mu);margin-top:1px">Décrivez votre projet, je vous recommande le bon matériau</div></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
        ${suggestions.map(q=>`<button onclick="iaSendSuggestion('${q.replace(/'/g,"\'")}')" class="btn btn-sm" style="font-size:10px">${q}</button>`).join('')}
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div id="iaChatMsgs" style="min-height:260px;max-height:380px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:var(--bg)">
        ${msgs||'<div class="msg-sys" style="margin:auto">Bonjour ! Décrivez votre projet, je vous aide à choisir le bon filament 👋</div>'}
        <div id="iaTyping" style="display:none"><div class="msg msg-a"><span style="opacity:.6;font-size:11px">En train de répondre…</span></div></div>
      </div>
      <div style="border-top:0.5px solid var(--bd);padding:10px;display:flex;gap:6px;background:var(--card)">
        <input type="text" id="iaInput" placeholder="Ex: coque de téléphone résistante aux chocs…" style="flex:1;font-size:11.5px" onkeydown="if(event.key==='Enter'){event.preventDefault();iaSend()}">
        <button class="btn btn-p" onclick="iaSend()" id="iaSendBtn">Envoyer</button>
      </div>
    </div>
    <div style="font-size:9.5px;color:var(--mu);margin-top:6px;text-align:center">Stock actuel : ${stockDispo||'aucun filament renseigné'}</div>
  </div>`;
}

async function iaSend(){
  const input=document.getElementById('iaInput');if(!input)return;
  const text=input.value.trim();if(!text)return;
  input.value='';await iaCall(text);
}
function iaSendSuggestion(txt){
  const input=document.getElementById('iaInput');if(input)input.value=txt;
  iaCall(txt);
}
async function iaCall(userMsg){
  iaMessages.push({role:'user',content:userMsg});
  ra();
  setTimeout(()=>{const t=document.getElementById('iaTyping');if(t)t.style.display='block';const b=document.getElementById('iaChatMsgs');if(b)b.scrollTop=b.scrollHeight;},50);
  const btn=document.getElementById('iaSendBtn');if(btn){btn.disabled=true;btn.textContent='…';}
  const stockDispo=D.materials.filter(m=>m.dispo).map(m=>`- ${m.nom} ${m.couleur} (${m.prix_kg}€/kg)`).join('\n')||'Aucun filament en stock.';
  const systemPrompt=`Tu es le conseiller matériaux de SZ IMPRESS3D, service d'impression 3D. Tu aides les clients à choisir leur filament.

Stock disponible :
${stockDispo}

Tes conseils :
- Courts et pratiques (max 5 lignes)
- Recommander en priorité les matériaux du stock
- Mentionner avantages/inconvénients
- Terminer par une question si besoin
- Français, ton chaleureux`;
  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:400,
        system:systemPrompt,
        messages:iaMessages.map(m=>({role:m.role,content:m.content}))
      })
    });
    const data=await response.json();
    const reply=data.content?.[0]?.text||'Désolé, réessayez dans un instant.';
    iaMessages.push({role:'assistant',content:reply});
  }catch(err){
    iaMessages.push({role:'assistant',content:'Connexion impossible. Réessayez dans un instant.'});
    console.warn('[IA]',err);
  }
  if(btn){btn.disabled=false;btn.textContent='Envoyer';}
  ra();
  setTimeout(()=>{const b=document.getElementById('iaChatMsgs');if(b)b.scrollTop=b.scrollHeight;},60);
}

</script>
